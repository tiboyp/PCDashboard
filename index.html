<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZPIO EATZ - Inventory</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{font-family:system-ui,sans-serif}.loader{border:3px solid #f3f3f3;border-top:3px solid #f59e0b;border-radius:50%;width:24px;height:24px;animation:spin 1s linear infinite}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.tbl{max-height:500px;overflow-y:auto}.tbl thead{position:sticky;top:0;z-index:10}</style>
</head>
<body class="bg-gray-100 min-h-screen">
<div id="app"></div>
<script>
const CONFIG={SHEET_ID:1sYNEJDA2G1sIFvPiVFdMO9CHNWRRbVYO35G9DsYyJ6g/edit,API_KEY:AIzaSyBUXtjtNDbL7PLhA3KHZbeFrKx8sxqOinA,SHEET:'DailyInventory'};
const API={
url:'https://sheets.googleapis.com/v4/spreadsheets',
async get(){
try{const r=await fetch(`${this.url}/${CONFIG.SHEET_ID}/values/${CONFIG.SHEET}?key=${CONFIG.API_KEY}`);
if(!r.ok)throw new Error('Failed');const d=await r.json();return d.values||[];}catch(e){console.error(e);return[];}
},
parse(rows){if(rows.length<2)return[];return rows.slice(1).map((r,i)=>({id:i+1,date:r[0]||'',itemName:r[1]||'',beginning:parseFloat(r[2])||0,delivery:parseFloat(r[3])||0,pullout:parseFloat(r[4])||0,total:parseFloat(r[5])||0,ending:parseFloat(r[6])||0,usage:parseFloat(r[7])||0,unitPrice:parseFloat(r[8])||0,amount:parseFloat(r[9])||0,branch:r[10]||''})).filter(x=>x.date&&x.itemName);}
};
const ITEMS={
'Raw Materials':[{name:'Potato Fries',unit:'kg',price:62.58},{name:'Curly Fries',unit:'kg',price:255.60}],
'Flavorings':[{name:'Cheese',unit:'g',price:0.70},{name:'Barbeque',unit:'g',price:0.70},{name:'Sour Cream and Onion',unit:'g',price:0.70},{name:'Chili Barbeque',unit:'g',price:0.70},{name:'Wasabi Mayo',unit:'g',price:0.70},{name:'Truffle',unit:'g',price:0.93}],
'Packaging':[{name:'Regular',unit:'pcs',price:3.66},{name:'Large',unit:'pcs',price:3.88},{name:'Jumbo',unit:'pcs',price:2.50},{name:'Mega',unit:'pcs',price:8.75},{name:'Giga',unit:'pcs',price:12.40},{name:'Tera',unit:'pcs',price:13.97}],
'Other Supplies':[{name:'Paper Bag #2',unit:'pcs',price:1.03},{name:'Paper Bag #4',unit:'pcs',price:1.48},{name:'Paper Bag #9',unit:'pcs',price:1.69},{name:'Filter Paper',unit:'pcs',price:0}]
};
function genSample(){
const branches=['DONA CARMEN','METRO HINIGARAN','BACOLOD PLAZA'];const data=[];const today=new Date();
branches.forEach(branch=>{for(let d=0;d<90;d++){const date=new Date(today);date.setDate(date.getDate()-d);const ds=date.toISOString().split('T')[0];
Object.entries(ITEMS).forEach(([cat,items])=>{items.forEach(item=>{
let beg,del,end;
if(item.name==='Potato Fries'){beg=100+Math.random()*100;del=d%3===0?30+Math.random()*20:0;end=beg+del-(15+Math.random()*20);}
else if(cat==='Flavorings'){beg=2000+Math.random()*3000;del=d%7===0?1000+Math.random()*500:0;end=beg+del-(150+Math.random()*300);}
else{beg=50+Math.random()*150;del=d%5===0?30+Math.random()*50:0;end=beg+del-(5+Math.random()*15);}
const po=Math.random()>0.95?Math.floor(Math.random()*10):0;const tot=beg+del-po;const use=Math.max(0,tot-end);
data.push({id:data.length+1,date:ds,itemName:item.name,category:cat,unit:item.unit,beginning:Math.max(0,beg),delivery:Math.max(0,del),pullout:Math.max(0,po),total:Math.max(0,tot),ending:Math.max(0,end),usage:Math.max(0,use),unitPrice:item.price,amount:Math.max(0,end)*item.price,branch});
});});
}});return data.sort((a,b)=>b.date.localeCompare(a.date));
}
const fmt=(v,d=2)=>{if(v==null||isNaN(v))return'-';return new Intl.NumberFormat('en-PH',{minimumFractionDigits:d,maximumFractionDigits:d}).format(v);};
const cur=v=>(!v||v===0)?'-':'₱'+fmt(v,2);
const getCat=n=>{const c={'Raw Materials':['Potato Fries','Curly Fries'],'Flavorings':['Cheese','Barbeque','Sour Cream and Onion','Chili Barbeque','Wasabi Mayo','Truffle','Sour Cheese','Sweet Corn','Chili Cheese','White Cheddar','Ketchup'],'Packaging':['Regular','Large','Jumbo','Mega','Giga','Tera'],'Other Supplies':['Paper Bag #2','Paper Bag #4','Paper Bag #9','Filter Paper','Palm Olein','Bottled Water']};for(const[k,v]of Object.entries(c))if(v.includes(n))return k;return'Other Supplies';};
const getUnit=n=>({'Potato Fries':'kg','Curly Fries':'kg','Cheese':'g','Barbeque':'g','Sour Cream and Onion':'g','Chili Barbeque':'g','Wasabi Mayo':'g','Truffle':'g'}[n]||'pcs');
const getPrice=n=>({'Potato Fries':62.58,'Curly Fries':255.60,'Cheese':0.70,'Barbeque':0.70,'Regular':3.66,'Large':3.88,'Jumbo':2.50,'Mega':8.75,'Giga':12.40,'Tera':13.97,'Paper Bag #2':1.03,'Paper Bag #4':1.48,'Paper Bag #9':1.69}[n]||0);

class App{
constructor(){this.data=[];this.branches=['DONA CARMEN','METRO HINIGARAN','BACOLOD PLAZA'];this.branch='DONA CARMEN';this.date=new Date().toISOString().split('T')[0];this.tab='dash';this.search='';this.month=new Date().toISOString().substring(0,7);this.loading=true;this.live=false;this.init();}
async init(){this.render();await this.load();this.loading=false;this.render();}
async load(){
if(CONFIG.SHEET_ID!=='YOUR_GOOGLE_SHEET_ID_HERE'&&CONFIG.API_KEY!=='YOUR_GOOGLE_API_KEY_HERE'){
try{const rows=await API.get();if(rows.length>1){this.data=API.parse(rows);this.live=true;this.branches=[...new Set(this.data.map(d=>d.branch))].filter(Boolean).sort();if(this.branches.length>0)this.branch=this.branches[0];const dates=[...new Set(this.data.map(d=>d.date))].sort().reverse();if(dates.length>0)this.date=dates[0];return;}}catch(e){console.error(e);}
}
this.data=genSample();this.live=false;const dates=[...new Set(this.data.map(d=>d.date))].sort().reverse();if(dates.length>0)this.date=dates[0];
}
getDates(){return[...new Set(this.data.filter(d=>d.branch===this.branch).map(d=>d.date))].sort().reverse();}
getMonths(){return[...new Set(this.data.map(d=>d.date.substring(0,7)))].sort().reverse();}
getBranchData(){return this.data.filter(d=>d.branch===this.branch&&d.date===this.date);}
getYield(){const bd=this.getBranchData();const pf=bd.find(d=>d.itemName==='Potato Fries');const fl=bd.filter(d=>getCat(d.itemName)==='Flavorings');const fu=pf?.usage||0;const flu=fl.reduce((s,d)=>s+(d.usage||0),0)/1000;const y=flu>0?fu/flu:0;return{fu,flu,y};}
getAve7(name){const dt=new Date(this.date);const d7=new Date(dt);d7.setDate(d7.getDate()-7);const r=this.data.filter(d=>d.branch===this.branch&&d.itemName===name&&new Date(d.date)<=dt&&new Date(d.date)>d7);return r.length===0?0:r.reduce((s,d)=>s+d.usage,0)/r.length;}
getGrouped(){const bd=this.getBranchData();const g={};['Raw Materials','Flavorings','Packaging','Other Supplies'].forEach(cat=>{g[cat]=bd.filter(d=>getCat(d.itemName)===cat).map(d=>{const av=this.getAve7(d.itemName);const dl=av>0?d.ending/av:null;const up=d.unitPrice||getPrice(d.itemName);return{...d,unit:d.unit||getUnit(d.itemName),ave:av,dl,unitPrice:up,amount:d.ending*up};});});return g;}
getFiltered(){let f=this.data.filter(d=>d.branch===this.branch);if(this.month)f=f.filter(d=>d.date.startsWith(this.month));if(this.search){const t=this.search.toLowerCase();f=f.filter(d=>d.itemName.toLowerCase().includes(t));}return f.sort((a,b)=>b.date!==a.date?b.date.localeCompare(a.date):a.itemName.localeCompare(b.itemName));}
render(){document.getElementById('app').innerHTML=this.html();this.events();}
html(){return`${this.header()}<main class="max-w-7xl mx-auto px-4 py-6">${this.loading?this.loader():this.tab==='dash'?this.dash():this.daily()}</main>${this.footer()}`;}
header(){const dates=this.getDates();return`
<header class="bg-gradient-to-r from-amber-600 to-orange-500 text-white shadow-lg">
<div class="max-w-7xl mx-auto px-4 py-4">
<div class="flex items-center justify-between flex-wrap gap-4">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div>
<div><h1 class="text-xl font-bold">ZPIO EATZ FOOD HUB</h1><p class="text-amber-100 text-sm">POTATO CORNER - Inventory</p></div>
</div>
<div class="flex items-center gap-3 flex-wrap">
${this.live?'<span class="bg-green-500 text-xs px-2 py-1 rounded-full">🟢 Live</span>':'<span class="bg-yellow-500 text-xs px-2 py-1 rounded-full">⚠️ Demo</span>'}
<select id="branchSel" class="bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white font-medium">${this.branches.map(b=>`<option value="${b}" ${b===this.branch?'selected':''} class="text-gray-800">${b}</option>`).join('')}</select>
${this.tab==='dash'?`<select id="dateSel" class="bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white font-medium">${dates.map(d=>`<option value="${d}" ${d===this.date?'selected':''} class="text-gray-800">${new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'})}</option>`).join('')}</select>`:''}
</div>
</div>
<div class="flex gap-1 mt-4">
<button data-tab="dash" class="tab-btn px-4 py-2 rounded-t-lg font-medium ${this.tab==='dash'?'bg-white text-amber-600':'bg-white/10 text-white/80'}">📦 Dashboard</button>
<button data-tab="daily" class="tab-btn px-4 py-2 rounded-t-lg font-medium ${this.tab==='daily'?'bg-white text-amber-600':'bg-white/10 text-white/80'}">📋 Daily</button>
</div>
</div>
</header>`;}
loader(){return`<div class="flex items-center justify-center py-20"><div class="text-center"><div class="loader mx-auto mb-4"></div><p class="text-gray-500">Loading...</p></div></div>`;}
dash(){const m=this.getYield();const g=this.getGrouped();const ys=m.y>=7.5&&m.y<=8.5?'good':m.y<7||m.y>9?'bad':'warn';
return`<div class="space-y-6">
<div class="bg-white rounded-xl shadow-sm border overflow-hidden">
<div class="bg-gradient-to-r from-amber-500 to-orange-400 text-white p-4 flex justify-between">
<div><p class="text-xs text-amber-100">Outlet</p><h2 class="text-xl font-bold">${this.branch}</h2></div>
<div class="text-right"><p class="text-xs text-amber-100">Date</p><p class="text-lg font-semibold">${new Date(this.date).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'})}</p></div>
</div>
<div class="p-4 grid grid-cols-2 lg:grid-cols-4 gap-4">
<div class="p-4 rounded-xl ${ys==='good'?'bg-green-50 border-2 border-green-200':ys==='bad'?'bg-red-50 border-2 border-red-200':'bg-amber-50 border-2 border-amber-200'}">
<p class="text-xs text-gray-500">Yield</p><p class="text-3xl font-bold">${fmt(m.y)}</p><p class="text-xs text-gray-500">Ideal: 8.0</p>
<span class="text-xs font-semibold mt-2 px-2 py-0.5 rounded-full ${ys==='good'?'text-green-700 bg-green-100':'text-red-700 bg-red-100'}">${ys==='good'?'✓ Good':'⚠ Check'}</span>
</div>
<div class="p-4 bg-blue-50 rounded-xl border border-blue-100"><p class="text-xs text-gray-500">Fries Usage</p><p class="text-2xl font-bold">${fmt(m.fu,3)}</p><p class="text-xs text-gray-500">kg</p></div>
<div class="p-4 bg-purple-50 rounded-xl border border-purple-100"><p class="text-xs text-gray-500">Flavorings</p><p class="text-2xl font-bold">${fmt(m.flu,4)}</p><p class="text-xs text-gray-500">kg</p></div>
<div class="p-4 bg-orange-50 rounded-xl border border-orange-100"><p class="text-xs text-gray-500">Records</p><p class="text-2xl font-bold">${this.data.length.toLocaleString()}</p><p class="text-xs text-gray-500">entries</p></div>
</div>
</div>
${Object.entries(g).map(([cat,items])=>this.catTable(cat,items)).join('')}
<div class="bg-gray-800 text-white rounded-xl p-4 flex justify-between items-center">
<span class="font-medium">Grand Total</span>
<span class="text-2xl font-bold">${cur(Object.values(g).flat().reduce((s,d)=>s+(d.amount||0),0))}</span>
</div>
</div>`;}
catTable(cat,items){return`
<div class="bg-white rounded-xl shadow-sm border overflow-hidden">
<div class="bg-gray-800 text-white px-4 py-3"><h3 class="font-bold">${cat}</h3></div>
<div class="overflow-x-auto"><table class="w-full text-sm">
<thead class="bg-amber-50"><tr>
<th class="px-3 py-2 text-left">Particulars</th><th class="px-3 py-2 text-center">Unit</th>
<th class="px-3 py-2 text-right">Beginning</th><th class="px-3 py-2 text-right">Delivery</th>
<th class="px-3 py-2 text-right">Pull-out</th><th class="px-3 py-2 text-right">Total</th>
<th class="px-3 py-2 text-right">Ending</th><th class="px-3 py-2 text-right">Usage</th>
<th class="px-3 py-2 text-right">Ave(7d)</th><th class="px-3 py-2 text-center">Days</th>
<th class="px-3 py-2 text-right">Amount</th>
</tr></thead>
<tbody>${items.length===0?'<tr><td colspan="11" class="px-3 py-4 text-center text-gray-400">No data</td></tr>':items.map(it=>{
const dlc=it.dl===null?'':it.dl>=7?'bg-green-100 text-green-700':it.dl>=3?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700';
return`<tr class="border-t hover:bg-gray-50">
<td class="px-3 py-2 font-medium">${it.itemName}</td><td class="px-3 py-2 text-center text-gray-600">${it.unit}</td>
<td class="px-3 py-2 text-right text-gray-600">${it.beginning>0?fmt(it.beginning):'-'}</td>
<td class="px-3 py-2 text-right text-gray-600">${it.delivery>0?fmt(it.delivery):'-'}</td>
<td class="px-3 py-2 text-right text-gray-600">${it.pullout>0?fmt(it.pullout):'-'}</td>
<td class="px-3 py-2 text-right">${it.total>0?fmt(it.total):'-'}</td>
<td class="px-3 py-2 text-right">${it.ending>0?fmt(it.ending):'-'}</td>
<td class="px-3 py-2 text-right font-semibold">${it.usage>0?fmt(it.usage):'-'}</td>
<td class="px-3 py-2 text-right text-gray-600">${it.ave>0?fmt(it.ave):'-'}</td>
<td class="px-3 py-2 text-center">${it.dl!==null&&it.dl>0?`<span class="px-2 py-0.5 rounded-full text-xs font-semibold ${dlc}">${fmt(it.dl,1)}</span>`:'-'}</td>
<td class="px-3 py-2 text-right">${it.amount>0?cur(it.amount):'-'}</td>
</tr>`;}).join('')}</tbody>
</table></div>
<div class="bg-gray-50 px-4 py-2 border-t flex justify-end"><span class="text-sm text-gray-500">Total: <strong>${cur(items.reduce((s,d)=>s+(d.amount||0),0))}</strong></span></div>
</div>`;}
daily(){const f=this.getFiltered();const months=this.getMonths();return`
<div class="space-y-4">
<div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
<h2 class="text-xl font-bold">Daily Inventory</h2>
<div class="flex flex-wrap gap-3">
<input type="text" id="searchIn" placeholder="Search..." value="${this.search}" class="px-4 py-2 border rounded-lg w-48">
<select id="monthSel" class="px-4 py-2 border rounded-lg"><option value="">All Months</option>${months.map(m=>`<option value="${m}" ${m===this.month?'selected':''}>${new Date(m+'-01').toLocaleDateString('en-PH',{month:'long',year:'numeric'})}</option>`).join('')}</select>
</div>
</div>
<div class="bg-white rounded-xl shadow-sm border overflow-hidden">
<div class="bg-gray-800 text-white px-4 py-3"><h3 class="font-bold">${this.branch} - ${f.length.toLocaleString()} records</h3></div>
<div class="tbl"><table class="w-full text-sm">
<thead class="bg-amber-50"><tr>
<th class="px-3 py-2 text-left">Date</th><th class="px-3 py-2 text-left">Particulars</th>
<th class="px-3 py-2 text-right">Beginning</th><th class="px-3 py-2 text-right">Delivery</th>
<th class="px-3 py-2 text-right">Pull Out</th><th class="px-3 py-2 text-right">Total</th>
<th class="px-3 py-2 text-right">Ending</th><th class="px-3 py-2 text-right">Usage</th>
</tr></thead>
<tbody>${f.slice(0,200).map(d=>`<tr class="border-t hover:bg-gray-50">
<td class="px-3 py-2 text-gray-600">${d.date}</td><td class="px-3 py-2 font-medium">${d.itemName}</td>
<td class="px-3 py-2 text-right text-gray-600">${d.beginning>0?fmt(d.beginning):'-'}</td>
<td class="px-3 py-2 text-right text-gray-600">${d.delivery>0?fmt(d.delivery):'-'}</td>
<td class="px-3 py-2 text-right text-gray-600">${d.pullout>0?fmt(d.pullout):'-'}</td>
<td class="px-3 py-2 text-right">${d.total>0?fmt(d.total):'-'}</td>
<td class="px-3 py-2 text-right">${d.ending>0?fmt(d.ending):'-'}</td>
<td class="px-3 py-2 text-right font-semibold">${d.usage>0?fmt(d.usage):'-'}</td>
</tr>`).join('')}</tbody>
</table></div>
${f.length>200?`<div class="bg-gray-50 px-4 py-2 border-t text-center text-sm text-gray-500">Showing 200 of ${f.length.toLocaleString()}</div>`:''}
</div>
</div>`;}
footer(){return`<footer class="bg-gray-800 text-gray-400 text-center py-4 text-sm mt-8"><p>ZPIO EATZ - Potato Corner Inventory</p><p class="text-xs mt-1">${this.live?'🟢 Connected to Google Sheets':'⚠️ Demo Mode'}</p></footer>`;}
events(){
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',e=>{this.tab=e.currentTarget.dataset.tab;this.render();}));
const bs=document.getElementById('branchSel');if(bs)bs.addEventListener('change',e=>{this.branch=e.target.value;const d=this.getDates();if(d.length>0&&!d.includes(this.date))this.date=d[0];this.render();});
const ds=document.getElementById('dateSel');if(ds)ds.addEventListener('change',e=>{this.date=e.target.value;this.render();});
const si=document.getElementById('searchIn');if(si)si.addEventListener('input',e=>{this.search=e.target.value;this.render();});
const ms=document.getElementById('monthSel');if(ms)ms.addEventListener('change',e=>{this.month=e.target.value;this.render();});
}
}
new App();
</script>
</body>
</html>
