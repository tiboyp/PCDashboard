<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZPIO EATZ - Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{font-family:system-ui,sans-serif}.loader{border:3px solid #f3f3f3;border-top:3px solid #f59e0b;border-radius:50%;width:24px;height:24px;animation:spin 1s linear infinite}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.tbl{max-height:500px;overflow-y:auto}.tbl thead{position:sticky;top:0;z-index:10}</style>
</head>
<body class="bg-gray-100 min-h-screen">
<div id="app"></div>
<script>
const CONFIG={
SHEET_ID:'1sYNEJDA2G1sIFvPiVFdMO9CHNWRRbVYO35G9DsYyJ6g',
API_KEY:'AIzaSyBUXtjtNDbL7PLhA3KHZbeFrKx8sxqOinA'
};
const API={
url:'https://sheets.googleapis.com/v4/spreadsheets',
async getSheet(sheetName){
try{const r=await fetch(`${this.url}/${CONFIG.SHEET_ID}/values/${encodeURIComponent(sheetName)}?key=${CONFIG.API_KEY}`);
if(!r.ok)return[];const d=await r.json();return d.values||[];}catch(e){console.error(e);return[];}
},
async getBranches(){
const rows=await this.getSheet('Branches');
if(rows.length<1)return[];
return rows.slice(1).map(r=>r[0]).filter(Boolean);
},
parseInventory(rows,branch){
if(rows.length<2)return[];
return rows.slice(1).map((r,i)=>({
id:i+1,date:r[0]||'',itemName:r[1]||'',beginning:parseFloat(r[2])||0,delivery:parseFloat(r[3])||0,pullout:parseFloat(r[4])||0,total:parseFloat(r[5])||0,ending:parseFloat(r[6])||0,usage:parseFloat(r[7])||0,unitPrice:parseFloat(r[8])||0,amount:parseFloat(r[9])||0,branch:branch
})).filter(x=>x.date&&x.itemName);
},
parseExpenses(rows,branch){
if(rows.length<2)return[];
return rows.slice(1).map((r,i)=>({
id:i+1,date:r[0]||'',particulars:r[1]||'',category:r[2]||'',uom:r[3]||'',qty:parseFloat(r[4])||0,unitPrice:parseFloat(r[5])||0,amount:parseFloat(r[6])||0,branch:branch,notes:r[7]||''
})).filter(x=>x.date&&x.particulars);
},
parseSales(rows,branch){
if(rows.length<2)return[];
return rows.slice(1).map((r,i)=>({
id:i+1,date:r[0]||'',menuItem:r[1]||'',qty:parseFloat(r[2])||0,sellingPrice:parseFloat(r[3])||0,amount:parseFloat(r[4])||0,paymentMethod:r[5]||'Cash',branch:branch,notes:r[6]||''
})).filter(x=>x.date&&x.menuItem);
}
};
const ITEMS={
'Raw Materials':[{name:'Potato Fries',unit:'kg',price:62.58},{name:'Curly Fries',unit:'kg',price:255.60}],
'Flavorings':[{name:'Cheese',unit:'g',price:0.70},{name:'Barbeque',unit:'g',price:0.70},{name:'Sour Cream and Onion',unit:'g',price:0.70},{name:'Chili Barbeque',unit:'g',price:0.70},{name:'Wasabi Mayo',unit:'g',price:0.70},{name:'Truffle',unit:'g',price:0.93}],
'Packaging':[{name:'Regular',unit:'pcs',price:3.66},{name:'Large',unit:'pcs',price:3.88},{name:'Jumbo',unit:'pcs',price:2.50},{name:'Mega',unit:'pcs',price:8.75},{name:'Giga',unit:'pcs',price:12.40},{name:'Tera',unit:'pcs',price:13.97}],
'Other Supplies':[{name:'Paper Bag #2',unit:'pcs',price:1.03},{name:'Paper Bag #4',unit:'pcs',price:1.48},{name:'Paper Bag #9',unit:'pcs',price:1.69},{name:'Filter Paper',unit:'pcs',price:0}]
};
function genSample(){const branches=['DONA CARMEN','METRO HINIGARAN','BACOLOD PLAZA'];const data=[];const today=new Date();branches.forEach(branch=>{for(let d=0;d<90;d++){const date=new Date(today);date.setDate(date.getDate()-d);const ds=date.toISOString().split('T')[0];Object.entries(ITEMS).forEach(([cat,items])=>{items.forEach(item=>{let beg,del,end;if(item.name==='Potato Fries'){beg=100+Math.random()*100;del=d%3===0?30+Math.random()*20:0;end=beg+del-(15+Math.random()*20);}else if(cat==='Flavorings'){beg=2000+Math.random()*3000;del=d%7===0?1000+Math.random()*500:0;end=beg+del-(150+Math.random()*300);}else{beg=50+Math.random()*150;del=d%5===0?30+Math.random()*50:0;end=beg+del-(5+Math.random()*15);}const po=Math.random()>0.95?Math.floor(Math.random()*10):0;const tot=beg+del-po;const use=Math.max(0,tot-end);data.push({id:data.length+1,date:ds,itemName:item.name,category:cat,unit:item.unit,beginning:Math.max(0,beg),delivery:Math.max(0,del),pullout:Math.max(0,po),total:Math.max(0,tot),ending:Math.max(0,end),usage:Math.max(0,use),unitPrice:item.price,amount:Math.max(0,end)*item.price,branch});});});}});return data.sort((a,b)=>b.date.localeCompare(a.date));}
function genSampleExpenses(){const branches=['DONA CARMEN','METRO HINIGARAN','BACOLOD PLAZA'];const categories=['Packaging Supplies','Potato Products','Flavored Powder','Salaries and Wages','Utilities','Cooking Oil','Cleaning Supplies','Office Supplies','Repairs and Maintenance','Miscellaneous'];const data=[];const today=new Date();branches.forEach(branch=>{for(let d=0;d<90;d++){const date=new Date(today);date.setDate(date.getDate()-d);const ds=date.toISOString().split('T')[0];const numExpenses=Math.floor(Math.random()*5)+1;for(let i=0;i<numExpenses;i++){const cat=categories[Math.floor(Math.random()*categories.length)];const amount=Math.random()*5000+100;data.push({id:data.length+1,date:ds,particulars:`${cat} Item`,category:cat,uom:'pcs',qty:Math.floor(Math.random()*10)+1,unitPrice:amount/10,amount,branch,notes:''});}}});return data.sort((a,b)=>b.date.localeCompare(a.date));}
function genSampleSales(){const branches=['DONA CARMEN','METRO HINIGARAN','BACOLOD PLAZA'];const menuItems=[{name:'Regular',price:41},{name:'Large',price:67},{name:'Jumbo',price:97},{name:'Mega',price:127},{name:'Giga',price:198},{name:'Tera',price:228}];const paymentMethods=['Cash','Cash','Cash','Cash','Gcash','Online Payment'];const data=[];const today=new Date();branches.forEach(branch=>{for(let d=0;d<90;d++){const date=new Date(today);date.setDate(date.getDate()-d);const ds=date.toISOString().split('T')[0];menuItems.forEach(item=>{const qty=Math.floor(Math.random()*30)+5;const payment=paymentMethods[Math.floor(Math.random()*paymentMethods.length)];data.push({id:data.length+1,date:ds,menuItem:item.name,qty,sellingPrice:item.price,amount:qty*item.price,paymentMethod:payment,branch,notes:''});});}});return data.sort((a,b)=>b.date.localeCompare(a.date));}
const fmt=(v,d=2)=>{if(v==null||isNaN(v))return'-';return new Intl.NumberFormat('en-PH',{minimumFractionDigits:d,maximumFractionDigits:d}).format(v);};
const cur=v=>(!v||v===0)?'-':'₱'+fmt(v,2);
const curShort=v=>{if(!v||v===0)return'-';if(v>=1000000)return'₱'+fmt(v/1000000,2)+'M';if(v>=1000)return'₱'+fmt(v/1000,1)+'K';return'₱'+fmt(v,0);};
const getCat=n=>{const c={'Raw Materials':['Potato Fries','Curly Fries','Chicken Fries','Chicken Popers'],'Packaging':['Regular','Large','Jumbo','Mega','Giga','Tera'],'Flavorings':['Cheese','Barbeque','Sour Cream and Onion','Chili Barbeque','Sour Cheese','Sweet Corn','Wasabi Mayo','Chili Cheese','Truffle','White Cheddar','Ketchup'],'Other Supplies':['Paper Bag #2','Paper Bag #4','Paper Bag #9','Palm Olein','Filter Paper','Bottled Water']};for(const[k,v]of Object.entries(c))if(v.includes(n))return k;return'Other Supplies';};
const ITEM_ORDER=['Potato Fries','Curly Fries','Regular','Large','Jumbo','Mega','Giga','Tera','Cheese','Barbeque','Sour Cream and Onion','Chili Barbeque','Sour Cheese','Sweet Corn','Wasabi Mayo','Chili Cheese','Truffle','White Cheddar','Ketchup','Paper Bag #2','Paper Bag #4','Paper Bag #9','Palm Olein','Filter Paper','Chicken Popers','Bottled Water','Chicken Fries'];
const sortItems=(items)=>items.sort((a,b)=>{const ia=ITEM_ORDER.indexOf(a.itemName);const ib=ITEM_ORDER.indexOf(b.itemName);if(ia===-1&&ib===-1)return a.itemName.localeCompare(b.itemName);if(ia===-1)return 1;if(ib===-1)return -1;return ia-ib;});
const getUnit=n=>({'Potato Fries':'kg','Curly Fries':'kg','Cheese':'g','Barbeque':'g','Sour Cream and Onion':'g','Chili Barbeque':'g','Wasabi Mayo':'g','Truffle':'g'}[n]||'pcs');
const getPrice=n=>({'Potato Fries':62.58,'Curly Fries':255.60,'Cheese':0.70,'Barbeque':0.70,'Regular':3.66,'Large':3.88,'Jumbo':2.50,'Mega':8.75,'Giga':12.40,'Tera':13.97,'Paper Bag #2':1.03,'Paper Bag #4':1.48,'Paper Bag #9':1.69}[n]||0);
const EXPENSE_CATEGORIES=['Packaging Supplies','Potato Products','Flavored Powder','Cooking Oil','Salaries and Wages','Utilities','Cleaning Supplies','Office Supplies','Store Supplies','Equipment','Repairs and Maintenance','Permits','Taxes','ALOF and Dues','FTH Fees','Non Controllable Expenses','Loans','Beverages','Miscellaneous'];
const MENU_ORDER=['Regular','Large','Jumbo','Mega','Giga','Tera','Loopys Large','Loopys Mega','Chicken Popers Large','Chicken Popers Mega','Chicken Fries Snack A','Chicken Fries Snack B','Flavoring','Bottled Water'];

class App{
constructor(){this.data=[];this.expenses=[];this.sales=[];this.branches=[];this.branch='';this.date=new Date().toISOString().split('T')[0];this.salesDate=new Date().toISOString().split('T')[0];this.dashMonth=new Date().toISOString().substring(0,7);this.tab='summary';this.search='';this.month=new Date().toISOString().substring(0,7);this.expMonth=new Date().toISOString().substring(0,7);this.loading=true;this.live=false;this.loadingMsg='Loading branches...';this.init();}
async init(){this.render();await this.load();this.loading=false;this.render();}
async load(){
if(CONFIG.SHEET_ID!=='YOUR_GOOGLE_SHEET_ID_HERE'&&CONFIG.API_KEY!=='YOUR_GOOGLE_API_KEY_HERE'){
try{
this.loadingMsg='Loading branches...';this.render();
const branches=await API.getBranches();
if(branches.length>0){
this.branches=branches;
this.branch=branches[0];
this.live=true;

this.loadingMsg='Loading inventory data...';this.render();
let allInventory=[];
for(const branch of branches){
const sheetName=`Inv_${branch.replace(/ /g,'_')}`;
const rows=await API.getSheet(sheetName);
const branchData=API.parseInventory(rows,branch);
allInventory=allInventory.concat(branchData);
}
this.data=allInventory.sort((a,b)=>b.date.localeCompare(a.date));

this.loadingMsg='Loading expense data...';this.render();
let allExpenses=[];
for(const branch of branches){
const sheetName=`Exp_${branch.replace(/ /g,'_')}`;
const rows=await API.getSheet(sheetName);
const branchData=API.parseExpenses(rows,branch);
allExpenses=allExpenses.concat(branchData);
}
this.expenses=allExpenses.sort((a,b)=>b.date.localeCompare(a.date));

this.loadingMsg='Loading sales data...';this.render();
let allSales=[];
for(const branch of branches){
const sheetName=`Sales_${branch.replace(/ /g,'_')}`;
const rows=await API.getSheet(sheetName);
const branchData=API.parseSales(rows,branch);
allSales=allSales.concat(branchData);
}
this.sales=allSales.sort((a,b)=>b.date.localeCompare(a.date));

const dates=[...new Set(this.data.map(d=>d.date))].sort().reverse();
if(dates.length>0)this.date=dates[0];
const salesDates=[...new Set(this.sales.map(d=>d.date))].sort().reverse();
if(salesDates.length>0)this.salesDate=salesDates[0];

console.log(`Loaded ${this.branches.length} branches, ${this.data.length} inventory, ${this.expenses.length} expenses, ${this.sales.length} sales`);
return;
}
}catch(e){console.error(e);}
}
this.branches=['DONA CARMEN','METRO HINIGARAN','BACOLOD PLAZA'];
this.branch=this.branches[0];
this.data=genSample();
this.expenses=genSampleExpenses();
this.sales=genSampleSales();
this.live=false;
const dates=[...new Set(this.data.map(d=>d.date))].sort().reverse();
if(dates.length>0)this.date=dates[0];
const salesDates=[...new Set(this.sales.map(d=>d.date))].sort().reverse();
if(salesDates.length>0)this.salesDate=salesDates[0];
}
getDates(){return[...new Set(this.data.filter(d=>d.branch===this.branch).map(d=>d.date))].sort().reverse();}
getSalesDates(){return[...new Set(this.sales.filter(d=>d.branch===this.branch).map(d=>d.date))].sort().reverse();}
getMonths(){return[...new Set(this.data.map(d=>d.date.substring(0,7)))].sort().reverse();}
getSalesMonths(){return[...new Set(this.sales.map(d=>d.date.substring(0,7)))].sort().reverse();}
getExpenseMonths(){return[...new Set(this.expenses.map(d=>d.date.substring(0,7)))].sort().reverse();}
getBranchData(){return this.data.filter(d=>d.branch===this.branch&&d.date===this.date);}
getYield(){const bd=this.getBranchData();const pf=bd.find(d=>d.itemName==='Potato Fries');const getUsage=(name)=>{const item=bd.find(d=>d.itemName===name);return item?.usage||0;};const regular=getUsage('Regular');const large=getUsage('Large');const jumbo=getUsage('Jumbo');const mega=getUsage('Mega');const giga=getUsage('Giga');const tera=getUsage('Tera');const fu=pf?.usage||0;const packagingCalc=((regular+(jumbo*3)+(mega*4)+(giga*7)+(tera*8))/2)+large;const y=fu>0?packagingCalc/fu:0;return{fu,packagingCalc,y};}
getAve7(name){const dt=new Date(this.date);const d7=new Date(dt);d7.setDate(d7.getDate()-7);const r=this.data.filter(d=>d.branch===this.branch&&d.itemName===name&&new Date(d.date)<=dt&&new Date(d.date)>d7);return r.length===0?0:r.reduce((s,d)=>s+d.usage,0)/r.length;}
getGrouped(){const bd=this.getBranchData();const g={};['Raw Materials','Packaging','Flavorings','Other Supplies'].forEach(cat=>{g[cat]=sortItems(bd.filter(d=>getCat(d.itemName)===cat).map(d=>{const av=this.getAve7(d.itemName);const dl=av>0?d.ending/av:null;const up=d.unitPrice||getPrice(d.itemName);return{...d,unit:d.unit||getUnit(d.itemName),ave:av,dl,unitPrice:up,amount:d.ending*up};}));});return g;}
getFiltered(){let f=this.data.filter(d=>d.branch===this.branch);if(this.month)f=f.filter(d=>d.date.startsWith(this.month));if(this.search){const t=this.search.toLowerCase();f=f.filter(d=>d.itemName.toLowerCase().includes(t));}return f.sort((a,b)=>b.date!==a.date?b.date.localeCompare(a.date):a.itemName.localeCompare(b.itemName));}
getBranchExpenses(branch,month){return this.expenses.filter(e=>(branch==='ALL'||e.branch===branch)&&(!month||e.date.startsWith(month)));}
getExpensesByCategory(expenses){const grouped={};EXPENSE_CATEGORIES.forEach(cat=>{const items=expenses.filter(e=>e.category===cat);if(items.length>0)grouped[cat]=items;});const otherCats=[...new Set(expenses.map(e=>e.category))].filter(c=>!EXPENSE_CATEGORIES.includes(c));otherCats.forEach(cat=>{const items=expenses.filter(e=>e.category===cat);if(items.length>0)grouped[cat]=items;});return grouped;}
getDailySales(){return this.sales.filter(s=>s.branch===this.branch&&s.date===this.salesDate);}
getSalesByPayment(){const ds=this.getDailySales();const byPayment={Cash:0,Gcash:0,'Online Payment':0,'SC/PWD':0};ds.forEach(s=>{const pm=s.paymentMethod;if(byPayment.hasOwnProperty(pm))byPayment[pm]+=s.amount;else if(pm.toLowerCase().includes('cash'))byPayment.Cash+=s.amount;else if(pm.toLowerCase().includes('gcash'))byPayment.Gcash+=s.amount;else if(pm.toLowerCase().includes('online'))byPayment['Online Payment']+=s.amount;else byPayment.Cash+=s.amount;});return byPayment;}
getSalesByMenuItem(){const ds=this.getDailySales();const byItem={};ds.forEach(s=>{if(!byItem[s.menuItem])byItem[s.menuItem]={qty:0,amount:0};byItem[s.menuItem].qty+=s.qty;byItem[s.menuItem].amount+=s.amount;});const sorted=Object.entries(byItem).sort((a,b)=>{const ia=MENU_ORDER.findIndex(m=>a[0].includes(m));const ib=MENU_ORDER.findIndex(m=>b[0].includes(m));if(ia===-1&&ib===-1)return a[0].localeCompare(b[0]);if(ia===-1)return 1;if(ib===-1)return -1;return ia-ib;});return sorted;}
// Dashboard Summary Methods
getMTDSales(branch,month){return this.sales.filter(s=>(branch==='ALL'||s.branch===branch)&&s.date.startsWith(month)).reduce((sum,s)=>sum+s.amount,0);}
getYTDSales(branch,month){const year=month.substring(0,4);return this.sales.filter(s=>(branch==='ALL'||s.branch===branch)&&s.date.startsWith(year)&&s.date<=month+'-31').reduce((sum,s)=>sum+s.amount,0);}
getMTDExpenses(branch,month){return this.expenses.filter(e=>(branch==='ALL'||e.branch===branch)&&e.date.startsWith(month)).reduce((sum,e)=>sum+e.amount,0);}
getYTDExpenses(branch,month){const year=month.substring(0,4);return this.expenses.filter(e=>(branch==='ALL'||e.branch===branch)&&e.date.startsWith(year)&&e.date<=month+'-31').reduce((sum,e)=>sum+e.amount,0);}
getBranchRankings(month){
const rankings=this.branches.map(branch=>{
const mtdSales=this.getMTDSales(branch,month);
const mtdExpenses=this.getMTDExpenses(branch,month);
const mtdNet=mtdSales-mtdExpenses;
const ytdSales=this.getYTDSales(branch,month);
const ytdExpenses=this.getYTDExpenses(branch,month);
const ytdNet=ytdSales-ytdExpenses;
return{branch,mtdSales,mtdExpenses,mtdNet,ytdSales,ytdExpenses,ytdNet};
});
return rankings.sort((a,b)=>b.mtdNet-a.mtdNet);
}
render(){document.getElementById('app').innerHTML=this.html();this.events();}
html(){return`${this.header()}<main class="max-w-7xl mx-auto px-4 py-6">${this.loading?this.loader():this.content()}</main>${this.footer()}`;}
content(){
if(this.tab==='summary')return this.summaryTab();
if(this.tab==='dash')return this.dash();
if(this.tab==='daily')return this.daily();
if(this.tab==='sales')return this.salesTab();
if(this.tab==='opex')return this.opex();
if(this.tab==='opexAll')return this.opexAll();
return this.summaryTab();
}
header(){const dates=this.getDates();const salesDates=this.getSalesDates();const salesMonths=this.getSalesMonths();return`
<header class="bg-gradient-to-r from-amber-600 to-orange-500 text-white shadow-lg">
<div class="max-w-7xl mx-auto px-4 py-4">
<div class="flex items-center justify-between flex-wrap gap-4">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div>
<div><h1 class="text-xl font-bold">ZPIO EATZ FOOD HUB</h1><p class="text-amber-100 text-sm">POTATO CORNER</p></div>
</div>
<div class="flex items-center gap-3 flex-wrap">
${this.live?`<span class="bg-green-500 text-xs px-2 py-1 rounded-full">🟢 Live</span>`:'<span class="bg-yellow-500 text-xs px-2 py-1 rounded-full">⚠️ Demo</span>'}
${this.tab==='summary'?`<select id="dashMonthSel" class="bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white font-medium">${salesMonths.map(m=>`<option value="${m}" ${m===this.dashMonth?'selected':''} class="text-gray-800">${new Date(m+'-01').toLocaleDateString('en-PH',{month:'long',year:'numeric'})}</option>`).join('')}</select>`:''}
${this.tab!=='opexAll'&&this.tab!=='summary'?`<select id="branchSel" class="bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white font-medium">${this.branches.map(b=>`<option value="${b}" ${b===this.branch?'selected':''} class="text-gray-800">${b}</option>`).join('')}</select>`:''}
${this.tab==='dash'?`<select id="dateSel" class="bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white font-medium">${dates.map(d=>`<option value="${d}" ${d===this.date?'selected':''} class="text-gray-800">${new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'})}</option>`).join('')}</select>`:''}
${this.tab==='sales'?`<select id="salesDateSel" class="bg-white/20 border border-white/30 rounded-lg px-4 py-2 text-white font-medium">${salesDates.map(d=>`<option value="${d}" ${d===this.salesDate?'selected':''} class="text-gray-800">${new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'})}</option>`).join('')}</select>`:''}
</div>
</div>
<div class="flex gap-1 mt-4 flex-wrap">
<button data-tab="summary" class="tab-btn px-3 py-2 rounded-t-lg font-medium text-sm ${this.tab==='summary'?'bg-white text-amber-600':'bg-white/10 text-white/80'}">📊 Dashboard</button>
<button data-tab="dash" class="tab-btn px-3 py-2 rounded-t-lg font-medium text-sm ${this.tab==='dash'?'bg-white text-amber-600':'bg-white/10 text-white/80'}">📦 Inventory</button>
<button data-tab="daily" class="tab-btn px-3 py-2 rounded-t-lg font-medium text-sm ${this.tab==='daily'?'bg-white text-amber-600':'bg-white/10 text-white/80'}">📋 Daily Inv</button>
<button data-tab="sales" class="tab-btn px-3 py-2 rounded-t-lg font-medium text-sm ${this.tab==='sales'?'bg-white text-amber-600':'bg-white/10 text-white/80'}">💵 Daily Sales</button>
<button data-tab="opex" class="tab-btn px-3 py-2 rounded-t-lg font-medium text-sm ${this.tab==='opex'?'bg-white text-amber-600':'bg-white/10 text-white/80'}">💰 OPEX</button>
<button data-tab="opexAll" class="tab-btn px-3 py-2 rounded-t-lg font-medium text-sm ${this.tab==='opexAll'?'bg-white text-amber-600':'bg-white/10 text-white/80'}">📈 OPEX Total</button>
</div>
</div>
</header>`;}
loader(){return`<div class="flex items-center justify-center py-20"><div class="text-center"><div class="loader mx-auto mb-4"></div><p class="text-gray-500">${this.loadingMsg}</p></div></div>`;}
summaryTab(){
const month=this.dashMonth;
const year=month.substring(0,4);
const monthName=new Date(month+'-01').toLocaleDateString('en-PH',{month:'long',year:'numeric'});
const rankings=this.getBranchRankings(month);
const totalMTDSales=this.getMTDSales('ALL',month);
const totalYTDSales=this.getYTDSales('ALL',month);
const totalMTDExp=this.getMTDExpenses('ALL',month);
const totalYTDExp=this.getYTDExpenses('ALL',month);
const totalMTDNet=totalMTDSales-totalMTDExp;
const totalYTDNet=totalYTDSales-totalYTDExp;
return`

<th class="px-3 py-2 text-left">Category</th>
${this.branches.map(b=>`<th class="px-3 py-2 text-right">${b}</th>`).join('')}
<th class="px-3 py-2 text-right font-bold">Total</th>
</tr></thead>
<tbody>${Object.entries(grouped).map(([cat,items])=>{
const catByBranch={};this.branches.forEach(b=>{catByBranch[b]=items.filter(e=>e.branch===b).reduce((s,e)=>s+e.amount,0);});
const catTotal=items.reduce((s,e)=>s+e.amount,0);
return`<tr class="border-t hover:bg-gray-50">
<td class="px-3 py-2 font-medium">${cat}</td>
${this.branches.map(b=>`<td class="px-3 py-2 text-right">${catByBranch[b]>0?cur(catByBranch[b]):'-'}</td>`).join('')}
<td class="px-3 py-2 text-right font-bold">${cur(catTotal)}</td>
</tr>`;}).join('')}
</tbody>
<tfoot class="bg-gray-100 font-bold"><tr>
<td class="px-3 py-2">GRAND TOTAL</td>
${this.branches.map(b=>`<td class="px-3 py-2 text-right">${cur(byBranch[b]||0)}</td>`).join('')}
<td class="px-3 py-2 text-right text-lg">${cur(total)}</td>
</tr></tfoot>
</table></div>
</div>
</div>`;}
expenseTable(cat,items){const total=items.reduce((s,e)=>s+e.amount,0);return`
<div class="bg-white rounded-xl shadow-sm border overflow-hidden">
<div class="bg-red-700 text-white px-4 py-3 flex justify-between"><h3 class="font-bold">${cat}</h3><span>${cur(total)}</span></div>
<div class="overflow-x-auto"><table class="w-full text-sm">
<thead class="bg-red-50"><tr>
<th class="px-3 py-2 text-left">Date</th>
<th class="px-3 py-2 text-left">Particulars</th>
<th class="px-3 py-2 text-center">UOM</th>
<th class="px-3 py-2 text-right">Qty</th>
<th class="px-3 py-2 text-right">Unit Price</th>
<th class="px-3 py-2 text-right">Amount</th>
<th class="px-3 py-2 text-left">Notes</th>
</tr></thead>
<tbody>${items.map(e=>`<tr class="border-t hover:bg-gray-50">
<td class="px-3 py-2 text-gray-600">${e.date}</td>
<td class="px-3 py-2 font-medium">${e.particulars}</td>
<td class="px-3 py-2 text-center text-gray-600">${e.uom}</td>
<td class="px-3 py-2 text-right">${e.qty>0?fmt(e.qty,0):'-'}</td>
<td class="px-3 py-2 text-right">${e.unitPrice>0?cur(e.unitPrice):'-'}</td>
<td class="px-3 py-2 text-right font-semibold">${cur(e.amount)}</td>
<td class="px-3 py-2 text-gray-500 text-xs">${e.notes||'-'}</td>
</tr>`).join('')}</tbody>
</table></div>
</div>`;}
footer(){return`<footer class="bg-gray-800 text-gray-400 text-center py-4 text-sm mt-8"><p>ZPIO EATZ - Potato Corner</p><p class="text-xs mt-1">${this.live?'🟢 Connected to Google Sheets':'⚠️ Demo Mode'}</p></footer>`;}
events(){
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',e=>{this.tab=e.currentTarget.dataset.tab;this.render();}));
const bs=document.getElementById('branchSel');if(bs)bs.addEventListener('change',e=>{this.branch=e.target.value;const d=this.getDates();if(d.length>0&&!d.includes(this.date))this.date=d[0];const sd=this.getSalesDates();if(sd.length>0&&!sd.includes(this.salesDate))this.salesDate=sd[0];this.render();});
const ds=document.getElementById('dateSel');if(ds)ds.addEventListener('change',e=>{this.date=e.target.value;this.render();});
const sds=document.getElementById('salesDateSel');if(sds)sds.addEventListener('change',e=>{this.salesDate=e.target.value;this.render();});
const dms=document.getElementById('dashMonthSel');if(dms)dms.addEventListener('change',e=>{this.dashMonth=e.target.value;this.render();});
const si=document.getElementById('searchIn');if(si)si.addEventListener('input',e=>{this.search=e.target.value;this.render();});
const ms=document.getElementById('monthSel');if(ms)ms.addEventListener('change',e=>{this.month=e.target.value;this.render();});
const ems=document.getElementById('expMonthSel');if(ems)ems.addEventListener('change',e=>{this.expMonth=e.target.value;this.render();});
}
}
new App();
</script>
</body>
